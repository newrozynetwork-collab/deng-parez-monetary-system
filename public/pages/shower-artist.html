<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Report · Deng Parez</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;600&family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800&display=swap');

:root {
  --bg-0: #07080d; --bg-1: #0e1018; --bg-2: #151823;
  --surface: #1a1e2a; --surface-h: #202535;
  --border: #242a3d; --border-l: #2e3549;
  --text: #e6e8ef; --text-d: #a3a9bc; --muted: #6a7085;
  --teal: #2dd4bf; --coral: #fb7185; --gold: #fbbf24;
  --violet: #a78bfa; --blue: #60a5fa; --green: #34d399;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: var(--bg-0); color: var(--text);
  font-family: 'Inter', system-ui, sans-serif;
  min-height: 100vh; overflow-x: hidden;
  background-image:
    radial-gradient(ellipse 60% 40% at 20% 0%, rgba(45,212,191,0.08) 0%, transparent 50%),
    radial-gradient(ellipse 60% 40% at 80% 0%, rgba(167,139,250,0.06) 0%, transparent 50%);
}
html[lang="ku"] body { font-family: 'Noto Kufi Arabic', 'Inter', system-ui, sans-serif; }

.container { max-width: 1280px; margin: 0 auto; padding: 36px 28px 80px; }

.lang-toggle {
  position: fixed; top: 20px; right: 20px; z-index: 100;
  display: inline-flex; background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; padding: 4px; gap: 2px; backdrop-filter: blur(8px);
}
html[dir="rtl"] .lang-toggle { right: auto; left: 20px; }
.lang-btn {
  background: transparent; border: none; color: var(--text-d);
  padding: 7px 14px; border-radius: 100px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  letter-spacing: 1.5px; font-weight: 600; cursor: pointer; transition: all 0.15s;
}
.lang-btn:hover { color: var(--text); }
.lang-btn.active { background: var(--teal); color: #000; }
html[lang="ku"] .lang-btn { font-family: 'Noto Kufi Arabic', monospace; letter-spacing: 0; }

/* BRAND */
.brand-bar {
  display: flex; align-items: center; justify-content: space-between;
  gap: 14px; padding: 14px 20px;
  background: linear-gradient(135deg, rgba(45,212,191,0.08) 0%, rgba(167,139,250,0.06) 100%);
  border: 1px solid var(--border); border-radius: 14px; margin-bottom: 28px;
  flex-wrap: wrap;
}
.brand-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
.brand-mark {
  width: 40px; height: 40px; border-radius: 10px;
  background: linear-gradient(135deg, var(--teal) 0%, var(--violet) 100%);
  display: grid; place-items: center; font-weight: 800; font-size: 1rem;
  color: #000; font-family: 'JetBrains Mono', monospace; letter-spacing: -1px;
}
.brand-meta { display: flex; flex-direction: column; line-height: 1.2; gap: 2px; }
.brand-name { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.3px; }
.brand-tagline {
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
}
html[lang="ku"] .brand-tagline { font-family: 'Noto Kufi Arabic'; letter-spacing: 0; font-size: 0.78rem; }
.brand-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 0.66rem;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--teal);
  background: rgba(45,212,191,0.1); padding: 5px 12px; border-radius: 100px;
  border: 1px solid rgba(45,212,191,0.2);
}
html[lang="ku"] .brand-tag { font-family: 'Noto Kufi Arabic'; letter-spacing: 0; font-size: 0.78rem; }

/* HEADER */
.header {
  margin-bottom: 20px; display: flex; align-items: flex-end;
  justify-content: space-between; gap: 20px; flex-wrap: wrap;
}
.header .title-block { flex: 1; min-width: 260px; }
.eyebrow {
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  letter-spacing: 3px; color: var(--teal); text-transform: uppercase;
  margin-bottom: 10px; display: inline-flex; align-items: center; gap: 8px;
}
.eyebrow::before { content: ''; width: 24px; height: 1px; background: var(--teal); }
html[lang="ku"] .eyebrow { font-family: 'Noto Kufi Arabic'; letter-spacing: 1px; font-size: 0.85rem; }
h1 {
  font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 800;
  line-height: 1.05; letter-spacing: -1.5px; margin-bottom: 8px;
}
h1 .accent {
  background: linear-gradient(135deg, var(--teal) 0%, var(--violet) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
}
.subtitle { color: var(--text-d); font-size: 1rem; }
.back-link {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  color: var(--muted); text-decoration: none; display: inline-flex;
  align-items: center; gap: 6px; margin-bottom: 12px;
  transition: color 0.15s;
}
.back-link:hover { color: var(--teal); }

/* MONTH PICKER */
.period-bar {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 18px; margin-bottom: 20px;
  display: flex; align-items: center; gap: 14px; flex-wrap: wrap;
}
.period-bar .label {
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  color: var(--muted); letter-spacing: 2px; text-transform: uppercase;
}
html[lang="ku"] .period-bar .label { font-family: 'Noto Kufi Arabic'; letter-spacing: 0; font-size: 0.8rem; }
.period-chips { display: flex; gap: 6px; flex-wrap: wrap; flex: 1; }
.period-chip {
  background: var(--bg-2); border: 1px solid var(--border); color: var(--text-d);
  padding: 6px 14px; border-radius: 100px; cursor: pointer; font-size: 0.78rem;
  font-family: 'JetBrains Mono', monospace; transition: all 0.15s;
  text-decoration: none; font-weight: 500;
}
.period-chip:hover { color: var(--text); border-color: var(--border-l); }
.period-chip.active {
  background: var(--teal); color: #000; border-color: var(--teal); font-weight: 700;
}

/* HERO */
.hero-metric {
  background: linear-gradient(135deg, rgba(45,212,191,0.08) 0%, rgba(167,139,250,0.05) 100%);
  border: 1px solid var(--border); border-radius: 20px;
  padding: 32px 36px; margin-bottom: 28px;
  position: relative; overflow: hidden;
}
.hero-metric::before {
  content: ''; position: absolute; top: -50%; right: -10%;
  width: 300px; height: 300px;
  background: radial-gradient(circle, rgba(45,212,191,0.15) 0%, transparent 70%);
  pointer-events: none;
}
.hero-metric .label {
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 12px;
}
html[lang="ku"] .hero-metric .label { font-family: 'Noto Kufi Arabic'; letter-spacing: 0; font-size: 0.85rem; }
.hero-amount { display: flex; align-items: baseline; gap: 14px; flex-wrap: wrap; }
.hero-amount .big {
  font-size: clamp(3rem, 8vw, 5.5rem); font-weight: 800;
  letter-spacing: -3px; line-height: 1;
  background: linear-gradient(135deg, #fff 0%, var(--teal) 100%);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; font-variant-numeric: tabular-nums; direction: ltr;
}
.hero-amount .currency {
  font-size: 1.1rem; font-weight: 500; color: var(--muted);
  letter-spacing: 2px; font-family: 'JetBrains Mono', monospace;
}
.hero-caption {
  margin-top: 16px; color: var(--text-d); font-size: 0.95rem;
  display: flex; gap: 10px; flex-wrap: wrap; align-items: center;
}
.hero-caption .pill {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 100px; padding: 4px 12px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem; color: var(--text);
}
html[lang="ku"] .hero-caption .pill { font-family: 'Noto Kufi Arabic'; font-size: 0.82rem; }
.hero-caption .pill b { color: var(--teal); font-weight: 600; }
.hero-caption .pill.star {
  background: linear-gradient(135deg, rgba(251,191,36,0.15) 0%, rgba(251,113,133,0.08) 100%);
  border-color: rgba(251,191,36,0.3);
}
.hero-caption .pill.star b { color: var(--gold); }

/* GRID */
.grid-2 { display: grid; grid-template-columns: 1.2fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-full { margin-bottom: 20px; }
@media (max-width: 900px) { .grid-2 { grid-template-columns: 1fr; } }

.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 24px; transition: border-color 0.2s;
}
.card:hover { border-color: var(--border-l); }
.card-head {
  display: flex; justify-content: space-between; align-items: center;
  margin-bottom: 20px; gap: 10px; flex-wrap: wrap;
}
.card-title { font-size: 1rem; font-weight: 600; letter-spacing: -0.3px; }
.card-sub { font-size: 0.8rem; color: var(--muted); margin-top: 2px; }
.card-tag {
  font-family: 'JetBrains Mono', monospace; font-size: 0.66rem;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--teal);
  background: rgba(45,212,191,0.1); padding: 3px 10px; border-radius: 100px;
}
html[lang="ku"] .card-tag { font-family: 'Noto Kufi Arabic'; letter-spacing: 0; font-size: 0.78rem; }
.chart-wrap { position: relative; height: 300px; }

/* PLATFORM CARDS */
.platforms-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px;
}
.platform-card {
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 12px; padding: 16px; position: relative;
  overflow: hidden; transition: transform 0.2s, border-color 0.2s;
}
.platform-card:hover { transform: translateY(-2px); border-color: var(--border-l); }
.platform-card.inactive { opacity: 0.4; }
.platform-card .accent-stripe { position: absolute; top: 0; left: 0; width: 4px; height: 100%; }
html[dir="rtl"] .platform-card .accent-stripe { left: auto; right: 0; }
.platform-head { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.platform-icon {
  width: 38px; height: 38px; border-radius: 10px;
  display: grid; place-items: center; font-weight: 800; font-size: 0.9rem;
  color: #fff; flex-shrink: 0; font-family: 'JetBrains Mono', monospace;
}
.platform-name { flex: 1; font-size: 0.85rem; font-weight: 600; line-height: 1.25; }
.platform-rev {
  font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;
  font-size: 1.5rem; font-weight: 700; color: var(--teal);
  line-height: 1; margin-bottom: 4px; direction: ltr;
}
.platform-pct-label {
  font-family: 'JetBrains Mono', monospace; font-size: 0.72rem;
  color: var(--text-d); margin-bottom: 10px; direction: ltr;
}
.platform-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
.platform-bar-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }

/* STORE LEGEND */
.store-legend { margin-top: 16px; display: flex; flex-direction: column; gap: 6px; }
.store-row {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 10px; border-radius: 8px; font-size: 0.85rem;
  transition: background 0.15s;
}
.store-row:hover { background: var(--surface-h); }
.store-row .swatch { width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0; }
.store-row .name { flex: 1; }
.store-row .val {
  font-family: 'JetBrains Mono', monospace; font-size: 0.8rem;
  color: var(--text-d); font-variant-numeric: tabular-nums; direction: ltr;
}

/* COUNTRY */
.country-controls { display: flex; gap: 6px; flex-wrap: wrap; }
.country-btn {
  background: transparent; border: 1px solid var(--border); color: var(--text-d);
  padding: 5px 12px; border-radius: 100px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.68rem;
  letter-spacing: 1px; text-transform: uppercase; cursor: pointer; transition: all 0.15s;
}
html[lang="ku"] .country-btn { font-family: 'Noto Kufi Arabic'; letter-spacing: 0; font-size: 0.8rem; }
.country-btn:hover { color: var(--text); border-color: var(--border-l); }
.country-btn.active { background: var(--teal); color: #000; border-color: var(--teal); font-weight: 600; }
.country-list { display: flex; flex-direction: column; gap: 6px; }
.country-row {
  display: grid; grid-template-columns: 30px 1fr auto;
  align-items: center; gap: 12px; padding: 9px 12px; border-radius: 8px;
  font-size: 0.88rem; position: relative; overflow: hidden;
  transition: background 0.15s;
}
.country-row:hover { background: var(--surface-h); }
.country-row .rank {
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  color: var(--muted); text-align: right; direction: ltr;
}
.country-row .flag-label { display: flex; align-items: center; gap: 10px; }
.country-row .flag {
  width: 24px; height: 18px; border-radius: 3px;
  background: var(--surface-h); display: grid; place-items: center;
  font-size: 14px; flex-shrink: 0;
}
.country-row .bar-bg {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(45,212,191,0.14) 0%, rgba(45,212,191,0.04) 100%);
  z-index: 0; pointer-events: none; transition: width 0.5s ease; border-radius: 8px;
}
html[dir="rtl"] .country-row .bar-bg {
  background: linear-gradient(270deg, rgba(45,212,191,0.14) 0%, rgba(45,212,191,0.04) 100%);
}
.country-row .name, .country-row .val { position: relative; z-index: 1; }
.country-row .val {
  font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
  font-variant-numeric: tabular-nums; color: var(--teal); font-weight: 600; direction: ltr;
}
.country-row.zero .val { color: var(--muted); }
.country-row.zero .bar-bg { display: none; }

/* TRACKS */
.tracks-table { width: 100%; border-collapse: separate; border-spacing: 0 4px; }
.tracks-table th {
  font-family: 'JetBrains Mono', monospace; font-size: 0.66rem;
  letter-spacing: 1.5px; text-transform: uppercase; color: var(--muted);
  text-align: left; padding: 0 14px 10px; font-weight: 500;
}
html[dir="rtl"] .tracks-table th { text-align: right; }
html[dir="rtl"] .tracks-table th.right { text-align: left; }
.tracks-table th.right { text-align: right; }
.tracks-table tr.trow td {
  background: var(--bg-2); padding: 14px;
  border-top: 1px solid var(--border); border-bottom: 1px solid var(--border);
  transition: background 0.15s;
}
.tracks-table tr.trow:hover td { background: var(--surface-h); }
.tracks-table tr.trow td:first-child {
  border-left: 1px solid var(--border);
  border-top-left-radius: 10px; border-bottom-left-radius: 10px;
}
.tracks-table tr.trow td:last-child {
  border-right: 1px solid var(--border);
  border-top-right-radius: 10px; border-bottom-right-radius: 10px;
  text-align: right;
}
html[dir="rtl"] .tracks-table tr.trow td:last-child { text-align: left; }
.track-title { font-weight: 600; margin-bottom: 4px; font-size: 0.95rem; }
.track-meta { color: var(--text-d); font-size: 0.78rem; }
.track-bar {
  width: 220px; max-width: 100%; height: 6px;
  background: var(--border); border-radius: 3px; overflow: hidden; margin-top: 8px;
}
.track-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--teal) 0%, var(--violet) 100%);
  border-radius: 3px; transition: width 0.8s ease;
}
.track-rev {
  font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;
  font-weight: 700; font-size: 1.1rem; color: var(--teal); direction: ltr;
}
.track-pct {
  font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
  color: var(--muted); margin-top: 2px; direction: ltr;
}

/* TX */
.tx-list { display: flex; flex-direction: column; gap: 10px; }
.tx-row {
  display: grid; grid-template-columns: 1fr auto auto;
  gap: 14px; align-items: center; padding: 12px 14px;
  background: var(--bg-2); border: 1px solid var(--border);
  border-radius: 10px; transition: border-color 0.15s;
  position: relative; overflow: hidden;
}
.tx-row:hover { border-color: var(--border-l); }
.tx-row .tx-bar {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, rgba(167,139,250,0.1) 0%, transparent 100%);
  z-index: 0; pointer-events: none;
}
html[dir="rtl"] .tx-row .tx-bar {
  background: linear-gradient(270deg, rgba(167,139,250,0.1) 0%, transparent 100%);
}
.tx-row > * { position: relative; z-index: 1; }
.tx-name { font-size: 0.88rem; font-weight: 500; }
.tx-qty {
  font-family: 'JetBrains Mono', monospace; font-size: 0.75rem;
  color: var(--text-d); text-align: right; direction: ltr;
}
.tx-qty .n { color: var(--text); font-weight: 600; }
.tx-rev {
  font-family: 'JetBrains Mono', monospace; font-variant-numeric: tabular-nums;
  color: var(--violet); font-weight: 700; font-size: 0.95rem;
  min-width: 70px; text-align: right; direction: ltr;
}

.loading, .empty {
  padding: 60px 20px; text-align: center; color: var(--text-d);
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px;
}
.loading .big, .empty .big { font-size: 3rem; margin-bottom: 14px; opacity: 0.3; }

footer {
  margin-top: 50px; padding-top: 24px; border-top: 1px solid var(--border);
  text-align: center; color: var(--muted); font-size: 0.75rem;
  font-family: 'JetBrains Mono', monospace; letter-spacing: 1px;
}

/* RESPONSIVE */
@media (max-width: 768px) {
  .container { padding: 60px 16px 60px; }
  .lang-toggle { top: 12px; right: 12px; padding: 3px; }
  html[dir="rtl"] .lang-toggle { left: 12px; right: auto; }
  .lang-btn { padding: 6px 12px; font-size: 0.68rem; letter-spacing: 1px; }
  .hero-metric { padding: 22px 20px; }
  .card { padding: 18px; }
  .chart-wrap { height: 260px; }
}
@media (max-width: 560px) {
  h1 { font-size: 2rem; letter-spacing: -1px; }
  .hero-amount .big { font-size: 2.6rem; letter-spacing: -2px; }
  .card { padding: 16px; border-radius: 12px; }
  .track-bar { width: 100%; }
  .tx-row { grid-template-columns: 1fr auto; gap: 6px 10px; }
  .tx-name { grid-column: 1 / -1; }
  .tracks-table tr.trow { display: flex; flex-direction: column; }
  .tracks-table tr.trow td {
    display: block; border-left: 1px solid var(--border); border-right: 1px solid var(--border);
  }
  .tracks-table tr.trow td:first-child {
    border-radius: 10px 10px 0 0; border-bottom: none; border-top: 1px solid var(--border);
  }
  .tracks-table tr.trow td:last-child {
    border-radius: 0 0 10px 10px; border-top: none; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between; align-items: center; text-align: left !important;
  }
  .tracks-table thead { display: none; }
}
</style>
</head>
<body>

<div class="lang-toggle">
  <button class="lang-btn active" data-lang="en">EN</button>
  <button class="lang-btn" data-lang="ku">کوردی</button>
</div>

<div class="container">

<a href="/shower" class="brand-logo brand-bar" style="text-decoration:none;">
  <div class="brand-logo">
    <div class="brand-mark">DP</div>
    <div class="brand-meta">
      <span class="brand-name">Deng Parez</span>
      <span class="brand-tagline" data-i18n="brandTagline">Artist Report Portal</span>
    </div>
  </div>
  <span class="brand-tag" data-i18n="officialReport">Official Artist Report</span>
</a>

<a href="/shower" class="back-link" data-i18n="backToAll">← Back to all artists</a>

<!-- HEADER -->
<div class="header">
  <div class="title-block">
    <div class="eyebrow" data-i18n="eyebrow">Royalty Insights</div>
    <h1 id="artistNameH1"><span class="accent" id="artistNameText">—</span></h1>
    <p class="subtitle" data-i18n="subtitle">Distribution revenue breakdown across platforms, territories &amp; tracks</p>
  </div>
</div>

<!-- PERIOD PICKER -->
<div class="period-bar" id="periodBar" style="display:none;">
  <span class="label" data-i18n="periodLabel">Period:</span>
  <div class="period-chips" id="periodChips"></div>
</div>

<div id="mainContent">
  <div class="loading"><div class="big">⏳</div><h3>Loading…</h3></div>
</div>

<footer data-i18n="footer">Deng Parez · Public Artist Report</footer>

</div>

<script>
const COUNTRY_FLAGS = {
  "United Kingdom":"🇬🇧","Iraq":"🇮🇶","Sweden":"🇸🇪","Germany":"🇩🇪","United States":"🇺🇸","Switzerland":"🇨🇭",
  "Canada":"🇨🇦","Denmark":"🇩🇰","New Zealand":"🇳🇿","Norway":"🇳🇴","Netherlands":"🇳🇱","Türkiye":"🇹🇷",
  "Australia":"🇦🇺","Finland":"🇫🇮","Belgium":"🇧🇪","Ukraine":"🇺🇦","Italy":"🇮🇹","Poland":"🇵🇱",
  "Japan":"🇯🇵","Saudi Arabia":"🇸🇦","Austria":"🇦🇹","United Arab Emirates":"🇦🇪",
  "People's Republic of China":"🇨🇳","Israel":"🇮🇱","Morocco":"🇲🇦","France":"🇫🇷","Greece":"🇬🇷",
  "Ireland":"🇮🇪","Romania":"🇷🇴","Malaysia":"🇲🇾","India":"🇮🇳","Qatar":"🇶🇦","Egypt":"🇪🇬",

const MONTH_LABEL = { en: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                     ku: ['ڕێبەندان','ڕەشەمە','ئازار','نیسان','گوڵان','حوزەیران','تەممووز','گەلاوێژ','خەرمانان','ڕەزبەر','خەزەڵوەر','بەفرانبار'] };

let currentLang = 'en';
let currentData = null;

function t(k) { return I18N[currentLang][k] || I18N.en[k] || k; }
function money(n) { return '$' + (Number(n) || 0).toFixed(2); }
function periodLabel(p, lang = currentLang) {
  if (!p) return '—';
  const [y, m] = p.split('-');
  return `${MONTH_LABEL[lang][parseInt(m)-1]} ${y}`;
}

function applyLangToStatic() {
  document.documentElement.setAttribute('lang', currentLang);
  document.documentElement.setAttribute('dir', currentLang === 'ku' ? 'rtl' : 'ltr');
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.dataset.i18n;
    el.textContent = t(key);
  });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
}

function parseRoute() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  // /shower/:slug/:period?
  return { slug: parts[1], period: parts[2] || null };
}

async function load() {
  const { slug, period } = parseRoute();
  try {
    const url = '/api/shower/public/' + slug + (period ? '/' + period : '');
    const res = await fetch(url);
    if (res.status === 404) {
      document.getElementById('mainContent').innerHTML =
        `<div class="empty"><div class="big">🎵</div><h3>Artist not found</h3><p>No royalty data for "${slug}"</p></div>`;
      return;
    }
    if (!res.ok) throw new Error('Failed to load');
    currentData = await res.json();
    render();
  } catch (e) {
    document.getElementById('mainContent').innerHTML =
      `<div class="empty"><div class="big">⚠</div><h3>Could not load</h3><p>${e.message}</p></div>`;
  }
}

function render() {
  if (!currentData) return;
  const { artist, period, periods, totalRevenue, totalQuantity, stores, countries, tracks, types } = currentData;

  document.title = `${artist.name} · Deng Parez`;
  document.getElementById('artistNameText').textContent = artist.name;

  // Period chips
  const bar = document.getElementById('periodBar');
  const chips = document.getElementById('periodChips');
  chips.innerHTML = '';
  if (periods && periods.length > 1) {
    bar.style.display = 'flex';
    periods.forEach(p => {
      const chip = document.createElement('a');
      chip.className = 'period-chip' + (p === period ? ' active' : '');
      chip.href = `/shower/${artist.slug}/${p}`;
      chip.textContent = periodLabel(p);
      chips.appendChild(chip);
    });
  } else {
    bar.style.display = periods && periods.length === 1 ? 'flex' : 'none';
    if (periods && periods.length === 1) {
      const chip = document.createElement('span');
      chip.className = 'period-chip active';
      chip.textContent = periodLabel(periods[0]);
      chips.appendChild(chip);
    }
  }

  if (!totalRevenue || totalRevenue <= 0) {
    document.getElementById('mainContent').innerHTML =
      `<div class="empty"><div class="big">📭</div><h3>${t('noData')}</h3></div>`;
    return;
  }

  const topTrack = tracks[0];
  const topStore = stores[0];
  const topStorePct = totalRevenue > 0 && topStore ? (topStore.rev / totalRevenue * 100).toFixed(0) : 0;
  const maxCountryRev = countries.length ? countries[0].rev : 0;
  const maxTrackRev = tracks.length ? tracks[0].rev : 0;
  const maxTypeRev = types.length ? types[0].rev : 0;

  const container = document.getElementById('mainContent');
  container.innerHTML = '';

  // HERO
  const hero = document.createElement('div');
  hero.className = 'hero-metric';
  hero.innerHTML = `
    <div class="label">${t('totalNetRevenue')} · ${periodLabel(period)}</div>
    <div class="hero-amount">
      <span class="big">${money(totalRevenue)}</span>
      <span class="currency">USD</span>
    </div>
    <div class="hero-caption" id="heroCap"></div>`;
  container.appendChild(hero);

  const cap = hero.querySelector('#heroCap');
  const pill = (cls, emoji, bHtml, label) => {
    const p = document.createElement('span'); p.className = 'pill' + (cls ? ' ' + cls : '');
    p.innerHTML = `${emoji} <b>${bHtml}</b> ${label}`;
    return p;
  };
  if (topTrack) cap.append(pill('star', '⭐', topTrack.name, t('topTrackLabel').replace(':','')));
  cap.append(pill('', '📈', totalQuantity.toLocaleString(), t('transactions')));
  cap.append(pill('', '🌍', countries.filter(c => c.rev > 0).length, t('countriesReached')));
  cap.append(pill('', '🎵', tracks.filter(x => x.rev > 0).length, t('tracksEarning')));
  cap.append(pill('', '🏪', stores.filter(s => s.rev > 0).length, t('platforms')));

  // GRID 2: Store doughnut + TX
  const grid2 = document.createElement('div'); grid2.className = 'grid-2';

  const storeCard = document.createElement('div'); storeCard.className = 'card';
  storeCard.innerHTML = `
    <div class="card-head">
      <div>
        <div class="card-title">${t('platformRevenueShare')}</div>
        <div class="card-sub">${t('distributionByStore')}</div>
      </div>
      <span class="card-tag">USD</span>
    </div>
    <div class="chart-wrap"><canvas id="storeChart"></canvas></div>
    <div class="store-legend" id="storeLegend"></div>`;
  grid2.appendChild(storeCard);

  const txCard = document.createElement('div'); txCard.className = 'card';
  txCard.innerHTML = `
    <div class="card-head">
      <div>
        <div class="card-title">${t('transactionTypes')}</div>
        <div class="card-sub">${t('txCategoryRevenue')}</div>
      </div>
      <span class="card-tag">${types.length} ${currentLang === 'ku' ? 'جۆر' : 'Types'}</span>
    </div>
    <div class="tx-list" id="txList"></div>`;
  grid2.appendChild(txCard);
  container.appendChild(grid2);

  // PLATFORMS section
  const platSection = document.createElement('div'); platSection.className = 'grid-full';
  platSection.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-title">${t('platformsTitle')}</div>
          <div class="card-sub">${t('platformsSub')}</div>
        </div>
        <span class="card-tag">${stores.length} ${currentLang === 'ku' ? 'فرۆشگا' : 'Stores'}</span>
      </div>
      <div class="platforms-grid" id="platformsGrid"></div>
    </div>`;
  container.appendChild(platSection);

  // COUNTRIES
  if (countries.length > 0) {
    const cSection = document.createElement('div'); cSection.className = 'grid-full';
    cSection.innerHTML = `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">${t('countries')}</div>
            <div class="card-sub">${t('revenueByTerritory')}</div>
          </div>
          <div class="country-controls">
            <button class="country-btn active" data-mode="top15">${t('top15')}</button>
            <button class="country-btn" data-mode="earning">${t('earning')}</button>
            <button class="country-btn" data-mode="all">${t('allCountries')} ${countries.length}</button>
          </div>
        </div>
        <div class="country-list" id="countryList"></div>
      </div>`;
    container.appendChild(cSection);
  }

  // TRACKS
  if (tracks.length > 0) {
    const tSection = document.createElement('div'); tSection.className = 'grid-full';
    tSection.innerHTML = `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-title">${t('trackPerformance')}</div>
            <div class="card-sub">${t('revenuePerTrack')}</div>
          </div>
          <span class="card-tag">${tracks.length} ${currentLang === 'ku' ? 'گۆرانی' : 'Tracks'}</span>
        </div>
        <table class="tracks-table">
          <thead><tr><th>${t('track')}</th><th class="right">${t('netRevenue')}</th></tr></thead>
          <tbody id="tracksBody"></tbody>
        </table>
      </div>`;
    container.appendChild(tSection);
  }

  // Store chart
  const activeStores = stores.filter(s => s.rev > 0);
  if (activeStores.length) {
    new Chart(document.getElementById('storeChart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: activeStores.map(s => s.name),
        datasets: [{
          data: activeStores.map(s => s.rev),
          backgroundColor: activeStores.map((s, i) => (PLATFORM_BRANDS[s.name] && PLATFORM_BRANDS[s.name].color) || STORE_COLORS[i % STORE_COLORS.length]),
          borderColor: '#0e1018', borderWidth: 3, hoverOffset: 10
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '68%',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#1a1e2a', borderColor: '#2e3549', borderWidth: 1,
            titleColor: '#e6e8ef', bodyColor: '#a3a9bc', padding: 12,
            callbacks: {
              label: (ctx) => `$${ctx.parsed.toFixed(2)} · ${((ctx.parsed/totalRevenue)*100).toFixed(1)}%`
            }
          }
        }
      }
    });
  }

  // Store legend
  const legend = document.getElementById('storeLegend');
  stores.forEach((s, i) => {
    const row = document.createElement('div'); row.className = 'store-row';
    const color = (PLATFORM_BRANDS[s.name] && PLATFORM_BRANDS[s.name].color) || STORE_COLORS[i % STORE_COLORS.length];
    const pct = totalRevenue > 0 ? ((s.rev / totalRevenue) * 100).toFixed(1) : '0';
    const sw = document.createElement('span'); sw.className = 'swatch'; sw.style.background = color;
    const nm = document.createElement('span'); nm.className = 'name'; nm.textContent = s.name;
    const vl = document.createElement('span'); vl.className = 'val'; vl.textContent = `$${s.rev.toFixed(2)} · ${pct}%`;
    row.append(sw, nm, vl);
    legend.appendChild(row);
  });

  // TX list
  const txList = document.getElementById('txList');
  types.forEach(tx => {
    const pct = maxTypeRev > 0 ? (tx.rev / maxTypeRev) * 100 : 0;
    const row = document.createElement('div'); row.className = 'tx-row';
    const bar = document.createElement('div'); bar.className = 'tx-bar';
    bar.style.clipPath = `inset(0 ${100 - pct}% 0 0)`;
    const name = document.createElement('div'); name.className = 'tx-name'; name.textContent = tx.name;
    const qty = document.createElement('div'); qty.className = 'tx-qty';
    const n = document.createElement('span'); n.className = 'n'; n.textContent = tx.qty.toLocaleString();
    qty.append(n, document.createTextNode(' ' + t('txShort')));
    const rev = document.createElement('div'); rev.className = 'tx-rev'; rev.textContent = money(tx.rev);
    row.append(bar, name, qty, rev);
    txList.appendChild(row);
  });

  // Platforms
  const pg = document.getElementById('platformsGrid');
  stores.forEach(s => {
    const brand = PLATFORM_BRANDS[s.name] || { color: '#6a7085', icon: '♪' };
    const pct = totalRevenue > 0 ? (s.rev / totalRevenue) * 100 : 0;
    const card = document.createElement('div');
    card.className = 'platform-card' + (s.rev === 0 ? ' inactive' : '');
    card.innerHTML = `
      <div class="accent-stripe" style="background:${brand.color}"></div>
      <div class="platform-head">
        <div class="platform-icon" style="background:${brand.color}">${brand.icon || '♪'}</div>
        <div class="platform-name"></div>
      </div>
      <div class="platform-rev">${money(s.rev)}</div>
      <div class="platform-pct-label">${pct.toFixed(1)}% ${currentLang === 'ku' ? 'لە گشتی' : 'of total'}</div>
      <div class="platform-bar"><div class="platform-bar-fill" style="width:0%;background:linear-gradient(90deg,${brand.color}aa 0%,${brand.color} 100%)"></div></div>`;
    card.querySelector('.platform-name').textContent = s.name;
    pg.appendChild(card);
    requestAnimationFrame(() => setTimeout(() => card.querySelector('.platform-bar-fill').style.width = pct + '%', 100));
  });

  // Countries
  if (countries.length > 0) renderCountries('top15');
  // Tracks
  if (tracks.length > 0) renderTracks();
}

function renderCountries(mode) {
  if (!currentData) return;
  const { countries } = currentData;
  const sorted = [...countries].sort((a,b) => b.rev - a.rev);
  const maxRev = sorted[0] ? sorted[0].rev : 0;
  let list;
  if (mode === 'top15') list = sorted.slice(0, 15);
  else if (mode === 'earning') list = sorted.filter(c => c.rev > 0);
  else list = sorted;

  const cl = document.getElementById('countryList');
  cl.innerHTML = '';
  list.forEach((c, idx) => {
    const row = document.createElement('div');
    row.className = 'country-row' + (c.rev === 0 ? ' zero' : '');
    const pct = maxRev > 0 ? (c.rev / maxRev) * 100 : 0;
    row.innerHTML = `
      <div class="bar-bg" style="width:${pct}%"></div>
      <div class="rank">#${idx+1}</div>
      <div class="flag-label">
        <span class="flag">${COUNTRY_FLAGS[c.name] || '🌐'}</span>
        <span class="name"></span>
      </div>
      <span class="val">${c.rev > 0 ? money(c.rev) : '—'}</span>`;
    row.querySelector('.name').textContent = c.name;
    cl.appendChild(row);
  });

  document.querySelectorAll('.country-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
    b.onclick = () => renderCountries(b.dataset.mode);
  });
}

function renderTracks() {
  const { tracks, totalRevenue } = currentData;
  const maxRev = tracks[0] ? tracks[0].rev : 0;
  const body = document.getElementById('tracksBody');
  body.innerHTML = '';
  tracks.forEach(tk => {
    const pct = maxRev > 0 ? (tk.rev / maxRev) * 100 : 0;
    const pctTotal = totalRevenue > 0 ? ((tk.rev / totalRevenue) * 100).toFixed(1) : 0;
    const tr = document.createElement('tr'); tr.className = 'trow';
    tr.innerHTML = `
      <td>
        <div class="track-title"></div>
        <div class="track-bar"><div class="track-bar-fill" style="width:0%"></div></div>
      </td>
      <td>
        <div class="track-rev">${money(tk.rev)}</div>
        <div class="track-pct">${t('pctOfTotal')(pctTotal)}</div>
      </td>`;
    tr.querySelector('.track-title').textContent = tk.name;
    body.appendChild(tr);
    requestAnimationFrame(() => setTimeout(() => tr.querySelector('.track-bar-fill').style.width = pct + '%', 100));
  });
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    applyLangToStatic();
    if (currentData) render();
  });
});

applyLangToStatic();
load();
</script>
