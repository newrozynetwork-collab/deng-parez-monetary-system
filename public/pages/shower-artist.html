<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Artist Report · Deng Parez</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=Schibsted+Grotesk:ital,wght@0,400..900;1,400..900&family=Spline+Sans+Mono:wght@300..700&family=Noto+Kufi+Arabic:wght@300..700&display=swap');

/* ════════════════════════════════════════════════════════
   GOLD MASTER — a record-label pressing for Deng Parez
   ink lacquer · champagne foil · editorial serif · grain
   ════════════════════════════════════════════════════════ */
:root {
  --ink-0: #0b0a07;
  --ink-1: #11100b;
  --ink-2: #17150e;
  --line: rgba(228, 198, 134, 0.13);
  --line-strong: rgba(228, 198, 134, 0.32);
  --cream: #f3ead9;
  --cream-dim: rgba(243, 234, 217, 0.62);
  --cream-faint: rgba(243, 234, 217, 0.38);
  --gold: #e3b458;
  --gold-soft: rgba(227, 180, 88, 0.16);
  --foil: linear-gradient(100deg, #f9ecc0 0%, #ecc679 26%, #b98931 50%, #f3da9a 72%, #d3a851 100%);
  --serif: 'Fraunces', 'Noto Kufi Arabic', georgia, serif;
  --sans: 'Schibsted Grotesk', 'Noto Kufi Arabic', system-ui, sans-serif;
  --mono: 'Spline Sans Mono', 'Noto Kufi Arabic', monospace;
  --ease: cubic-bezier(0.16, 0.84, 0.3, 1);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
::selection { background: var(--gold); color: var(--ink-0); }
:focus-visible { outline: 2px solid var(--gold); outline-offset: 3px; border-radius: 4px; }
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-track { background: var(--ink-0); }
::-webkit-scrollbar-thumb { background: #2c2715; border-radius: 6px; border: 2px solid var(--ink-0); }
::-webkit-scrollbar-thumb:hover { background: #4a3f1f; }

html { scrollbar-color: #2c2715 var(--ink-0); }
body {
  background: var(--ink-0); color: var(--cream);
  font-family: var(--sans);
  font-size: 16px; line-height: 1.5;
  min-height: 100vh; overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
html[lang="ku"] body { font-family: 'Noto Kufi Arabic', var(--sans); }

/* stage light + grain atmosphere */
.atmosphere { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
.atmosphere::before {
  content: ''; position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 52% 38% at 18% -6%, rgba(227, 180, 88, 0.13) 0%, transparent 60%),
    radial-gradient(ellipse 44% 30% at 86% 0%, rgba(196, 110, 74, 0.07) 0%, transparent 60%),
    radial-gradient(ellipse 70% 52% at 50% 118%, rgba(227, 180, 88, 0.05) 0%, transparent 55%);
}
.atmosphere::after {
  content: ''; position: absolute; inset: -50%;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.5'/%3E%3C/svg%3E");
  opacity: 0.05; mix-blend-mode: overlay;
}

.container { position: relative; z-index: 1; max-width: 1240px; margin: 0 auto; padding: 30px 30px 90px; }

/* ─── MASTHEAD ─── */
.masthead {
  display: flex; align-items: center; justify-content: space-between;
  gap: 16px; flex-wrap: wrap;
  padding-bottom: 22px; margin-bottom: 40px;
  border-bottom: 1px solid var(--line);
}
.wordmark { display: flex; align-items: baseline; gap: 14px; text-decoration: none; color: inherit; }
.wordmark .mark {
  font-family: var(--serif); font-weight: 600; font-size: 1.18rem;
  letter-spacing: 0.34em; text-transform: uppercase; color: var(--cream);
  white-space: nowrap;
}
.wordmark .mark em { font-style: italic; color: var(--gold); }
.wordmark .sub {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--cream-faint); white-space: nowrap;
}
html[lang="ku"] .wordmark .sub { letter-spacing: 0.04em; font-size: 0.72rem; }
.masthead-right { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.lang-toggle { display: inline-flex; border: 1px solid var(--line); border-radius: 100px; padding: 3px; gap: 2px; background: rgba(243, 234, 217, 0.03); }
.lang-btn {
  background: transparent; border: none; color: var(--cream-dim);
  padding: 6px 15px; border-radius: 100px; cursor: pointer;
  font-family: var(--mono); font-size: 0.66rem; letter-spacing: 0.16em; font-weight: 500;
  transition: color 0.2s, background 0.2s;
}
.lang-btn:hover { color: var(--cream); }
.lang-btn.active { background: var(--gold); color: var(--ink-0); font-weight: 700; }
html[lang="ku"] .lang-btn { font-family: 'Noto Kufi Arabic'; letter-spacing: 0; font-size: 0.74rem; }

/* ─── HERO ─── */
.hero { display: grid; grid-template-columns: minmax(210px, 290px) 1fr; gap: 52px; align-items: center; margin-bottom: 46px; }
@media (max-width: 860px) { .hero { grid-template-columns: 1fr; gap: 30px; justify-items: center; text-align: center; } }

/* the record */
.disc-stage { position: relative; width: 100%; aspect-ratio: 1; max-width: 290px; }
.disc {
  position: absolute; inset: 0; border-radius: 50%;
  background:
    radial-gradient(circle at 32% 30%, rgba(255, 245, 215, 0.16) 0%, transparent 36%),
    repeating-radial-gradient(circle at 50% 50%, #14110b 0px, #14110b 1.6px, #0c0a06 1.6px, #0c0a06 3.4px);
  box-shadow:
    0 24px 70px -18px rgba(0, 0, 0, 0.85),
    inset 0 0 0 1px rgba(227, 180, 88, 0.22),
    inset 0 0 50px rgba(0, 0, 0, 0.6);
  animation: spin 14s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
.disc::before { /* groove highlights */
  content: ''; position: absolute; inset: 7%;
  border-radius: 50%;
  background:
    radial-gradient(circle, transparent 58%, rgba(227, 180, 88, 0.07) 60%, transparent 62%),
    radial-gradient(circle, transparent 72%, rgba(227, 180, 88, 0.06) 74%, transparent 76%),
    radial-gradient(circle, transparent 86%, rgba(227, 180, 88, 0.05) 88%, transparent 90%);
}
.disc .label {
  position: absolute; inset: 31%;
  border-radius: 50%;
  background:
    radial-gradient(circle at 36% 32%, #f6e3ae 0%, #e3b458 38%, #a97c2c 78%, #8a6220 100%);
  display: grid; place-items: center;
  box-shadow: inset 0 0 0 1px rgba(60, 40, 8, 0.4), inset 0 2px 10px rgba(255, 250, 230, 0.35);
}
.disc .label .mono {
  font-family: var(--serif); font-weight: 700; font-style: italic;
  font-size: clamp(2rem, 7vw, 3.1rem); color: #241804; line-height: 1;
  letter-spacing: -0.02em;
}
.disc .label::after { /* spindle */
  content: ''; position: absolute; width: 9%; height: 9%;
  background: var(--ink-0); border-radius: 50%;
  box-shadow: inset 0 1px 3px rgba(0, 0, 0, 0.9), 0 0 0 2px rgba(36, 24, 4, 0.55);
}
.disc-sheen {
  position: absolute; inset: 0; border-radius: 50%; pointer-events: none;
  background: conic-gradient(from 210deg, transparent 0deg, rgba(255, 246, 220, 0.10) 22deg, transparent 56deg, transparent 175deg, rgba(255, 246, 220, 0.06) 200deg, transparent 230deg);
}

.hero-copy { min-width: 0; }
.eyebrow {
  display: inline-flex; align-items: center; gap: 12px;
  font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.34em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 16px;
}
.eyebrow::before, .eyebrow::after { content: ''; width: 30px; height: 1px; background: var(--line-strong); }
html[lang="ku"] .eyebrow { letter-spacing: 0.06em; font-size: 0.78rem; }
h1.artist-name {
  font-family: var(--serif); font-weight: 460;
  font-size: clamp(2.7rem, 6.4vw, 5rem);
  line-height: 0.98; letter-spacing: -0.015em;
  margin-bottom: 6px; color: var(--cream);
  font-variation-settings: 'opsz' 144;
}
html[lang="ku"] h1.artist-name { font-weight: 700; line-height: 1.25; letter-spacing: 0; }
.hero-amount-label {
  font-family: var(--mono); font-size: 0.64rem; letter-spacing: 0.26em;
  text-transform: uppercase; color: var(--cream-faint); margin: 26px 0 6px;
}
html[lang="ku"] .hero-amount-label { letter-spacing: 0.04em; font-size: 0.76rem; }
.hero-amount { display: flex; align-items: baseline; gap: 16px; flex-wrap: wrap; }
@media (max-width: 860px) { .hero-amount { justify-content: center; } }
.hero-amount .big {
  font-family: var(--serif); font-weight: 560;
  font-size: clamp(3.1rem, 8.6vw, 6rem); line-height: 1; letter-spacing: -0.02em;
  background: var(--foil);
  -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent;
  font-variant-numeric: tabular-nums lining-nums; direction: ltr;
  filter: drop-shadow(0 3px 22px rgba(227, 180, 88, 0.22));
}
.hero-amount .currency { font-family: var(--mono); font-size: 0.92rem; letter-spacing: 0.3em; color: var(--cream-faint); }
.hero-caption { margin-top: 24px; display: flex; gap: 8px 8px; flex-wrap: wrap; align-items: center; }
@media (max-width: 860px) { .hero-caption { justify-content: center; } }
.hero-caption .pill {
  display: inline-flex; align-items: center; gap: 7px;
  border: 1px solid var(--line); background: rgba(243, 234, 217, 0.025);
  border-radius: 100px; padding: 6px 14px;
  font-family: var(--mono); font-size: 0.68rem; color: var(--cream-dim);
  letter-spacing: 0.02em; transition: border-color 0.25s;
}
.hero-caption .pill:hover { border-color: var(--line-strong); }
.hero-caption .pill b { color: var(--gold); font-weight: 600; }
html[lang="ku"] .hero-caption .pill { font-size: 0.78rem; }
.hero-caption .pill.star { border-color: rgba(227, 180, 88, 0.45); background: var(--gold-soft); color: var(--cream); }

/* ─── PERIOD STRIP ─── */
.period-bar {
  display: flex; align-items: center; gap: 16px; flex-wrap: wrap;
  border-block: 1px solid var(--line);
  padding: 15px 2px; margin-bottom: 44px;
}
.period-bar .label {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.3em;
  text-transform: uppercase; color: var(--cream-faint); white-space: nowrap;
}
html[lang="ku"] .period-bar .label { letter-spacing: 0.04em; font-size: 0.74rem; }
.period-chips { display: flex; gap: 7px; flex-wrap: wrap; flex: 1; min-width: 0; }
.period-chip {
  border: 1px solid var(--line); color: var(--cream-dim);
  padding: 6px 15px; border-radius: 100px; cursor: pointer;
  font-family: var(--mono); font-size: 0.7rem; letter-spacing: 0.04em;
  text-decoration: none; transition: all 0.22s var(--ease); background: transparent;
  white-space: nowrap;
}
.period-chip:hover { color: var(--cream); border-color: var(--line-strong); transform: translateY(-1px); }
.period-chip.active { background: var(--gold); border-color: var(--gold); color: var(--ink-0); font-weight: 700; }

/* foil download button */
.dl-btn {
  position: relative; overflow: hidden;
  margin-inline-start: auto;
  display: inline-flex; align-items: center; gap: 8px;
  padding: 10px 20px; border-radius: 100px;
  background: var(--foil); color: #241804;
  font-family: var(--mono); font-size: 0.7rem; font-weight: 700; letter-spacing: 0.08em;
  text-decoration: none; white-space: nowrap; border: none; cursor: pointer;
  box-shadow: 0 6px 26px -8px rgba(227, 180, 88, 0.55);
  transition: transform 0.22s var(--ease), box-shadow 0.22s;
}
.dl-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 34px -8px rgba(227, 180, 88, 0.65); }
.dl-btn::after {
  content: ''; position: absolute; top: 0; bottom: 0; width: 46%;
  background: linear-gradient(100deg, transparent 0%, rgba(255, 255, 255, 0.55) 50%, transparent 100%);
  inset-inline-start: -60%; transform: skewX(-18deg);
  transition: inset-inline-start 0.55s var(--ease);
}
.dl-btn:hover::after { inset-inline-start: 115%; }
html[lang="ku"] .dl-btn { letter-spacing: 0; font-size: 0.8rem; }
@media (max-width: 620px) { .dl-btn { margin-inline-start: 0; width: 100%; justify-content: center; } }

/* ─── SECTIONS / CARDS ─── */
.section { margin-bottom: 38px; }
.card {
  background: linear-gradient(180deg, rgba(243, 234, 217, 0.028) 0%, rgba(243, 234, 217, 0.012) 100%);
  border: 1px solid var(--line);
  border-radius: 18px; padding: 28px;
  transition: border-color 0.3s;
}
.card:hover { border-color: var(--line-strong); }
.grid-2 { display: grid; grid-template-columns: 1.15fr 1fr; gap: 22px; }
@media (max-width: 940px) { .grid-2 { grid-template-columns: 1fr; } }
.card-head { display: flex; justify-content: space-between; align-items: flex-end; gap: 12px; flex-wrap: wrap; margin-bottom: 24px; }
.card-kicker {
  font-family: var(--mono); font-size: 0.58rem; letter-spacing: 0.32em;
  text-transform: uppercase; color: var(--gold); margin-bottom: 7px;
}
html[lang="ku"] .card-kicker { letter-spacing: 0.04em; font-size: 0.72rem; }
.card-title { font-family: var(--serif); font-weight: 520; font-size: 1.5rem; letter-spacing: -0.01em; line-height: 1.1; }
html[lang="ku"] .card-title { font-weight: 700; }
.card-sub { font-size: 0.82rem; color: var(--cream-faint); margin-top: 5px; }
.card-tag {
  font-family: var(--mono); font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
  color: var(--gold); background: var(--gold-soft); border: 1px solid rgba(227, 180, 88, 0.3);
  padding: 5px 13px; border-radius: 100px; white-space: nowrap;
}
html[lang="ku"] .card-tag { letter-spacing: 0; font-size: 0.74rem; }

/* ─── LEDGER (monthly summary) ─── */
.ms-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }
.ms-table { width: 100%; border-collapse: collapse; font-variant-numeric: tabular-nums; }
.ms-table th {
  font-family: var(--mono); font-size: 0.58rem; text-transform: uppercase; letter-spacing: 0.26em;
  color: var(--cream-faint); font-weight: 500; text-align: start;
  padding: 0 14px 12px; border-bottom: 1px solid var(--line-strong);
}
html[lang="ku"] .ms-table th { letter-spacing: 0.03em; font-size: 0.7rem; }
.ms-table td { padding: 13px 14px; border-bottom: 1px solid var(--line); }
.ms-table tbody tr { transition: background 0.2s; }
.ms-table tbody tr:hover { background: rgba(243, 234, 217, 0.025); }
.ms-table tbody tr:last-child td { border-bottom: none; }
.ms-month { white-space: nowrap; }
.ms-table a.month-link {
  color: var(--cream); text-decoration: none; font-weight: 500;
  border-bottom: 1px dashed transparent; transition: color 0.2s, border-color 0.2s;
}
.ms-table a.month-link:hover { color: var(--gold); border-bottom-color: var(--gold); }
.ms-bar-cell { width: 46%; min-width: 130px; }
.ms-bar { height: 5px; background: rgba(243, 234, 217, 0.07); border-radius: 4px; overflow: hidden; }
.ms-bar i {
  display: block; height: 100%; width: 0;
  background: var(--foil); border-radius: 4px;
  transition: width 1s var(--ease);
}
.ms-num {
  text-align: end; font-family: var(--mono); font-size: 0.84rem;
  color: var(--gold); white-space: nowrap; direction: ltr;
}
.peak-tag {
  display: inline-block; margin-inline-start: 9px;
  font-family: var(--mono); font-size: 0.54rem; letter-spacing: 0.2em;
  color: var(--ink-0); background: var(--gold);
  border-radius: 4px; padding: 2px 7px; vertical-align: 2px; font-weight: 700;
}
html[lang="ku"] .peak-tag { letter-spacing: 0; font-size: 0.66rem; }

/* ─── DOUGHNUT ─── */
.chart-wrap { position: relative; height: 290px; }
.chart-center {
  position: absolute; inset: 0; display: grid; place-content: center; text-align: center;
  pointer-events: none; gap: 2px;
}
.chart-center .v {
  font-family: var(--serif); font-size: 1.7rem; font-weight: 560;
  background: var(--foil); -webkit-background-clip: text; background-clip: text;
  -webkit-text-fill-color: transparent; direction: ltr;
}
.chart-center .l { font-family: var(--mono); font-size: 0.56rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--cream-faint); }
html[lang="ku"] .chart-center .l { letter-spacing: 0.04em; font-size: 0.68rem; }
.store-legend { margin-top: 20px; display: flex; flex-direction: column; gap: 2px; }
.store-row {
  display: flex; align-items: center; gap: 11px;
  padding: 8px 10px; border-radius: 9px; font-size: 0.85rem;
  transition: background 0.18s;
}
.store-row:hover { background: rgba(243, 234, 217, 0.035); }
.store-row .swatch { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; box-shadow: 0 0 8px -1px currentColor; }
.store-row .name { flex: 1; color: var(--cream-dim); min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.store-row .val { font-family: var(--mono); font-size: 0.74rem; color: var(--cream-dim); font-variant-numeric: tabular-nums; direction: ltr; white-space: nowrap; }

/* ─── TRANSACTION TYPES ─── */
.tx-list { display: flex; flex-direction: column; gap: 11px; }
.tx-row {
  position: relative; overflow: hidden;
  display: grid; grid-template-columns: 1fr auto auto; gap: 14px; align-items: center;
  padding: 14px 16px; border: 1px solid var(--line); border-radius: 12px;
  transition: border-color 0.2s;
}
.tx-row:hover { border-color: var(--line-strong); }
.tx-row .tx-bar {
  position: absolute; inset-block: 0; inset-inline-start: 0; width: 100%;
  background: linear-gradient(to inline-end, var(--gold-soft), transparent);
  background: linear-gradient(90deg, var(--gold-soft) 0%, transparent 100%);
  z-index: 0; pointer-events: none;
}
html[dir="rtl"] .tx-row .tx-bar { background: linear-gradient(270deg, var(--gold-soft) 0%, transparent 100%); }
.tx-row > * { position: relative; z-index: 1; }
.tx-name { font-size: 0.88rem; font-weight: 500; color: var(--cream); }
.tx-qty { font-family: var(--mono); font-size: 0.7rem; color: var(--cream-faint); direction: ltr; white-space: nowrap; }
.tx-qty .n { color: var(--cream-dim); font-weight: 600; }
.tx-rev { font-family: var(--mono); font-size: 0.92rem; color: var(--gold); font-weight: 600; direction: ltr; white-space: nowrap; }
@media (max-width: 560px) {
  .tx-row { grid-template-columns: 1fr auto; gap: 4px 10px; }
  .tx-name { grid-column: 1 / -1; }
}

/* ─── PLATFORM CARDS ─── */
.platforms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(225px, 1fr)); gap: 13px; }
.platform-card {
  position: relative; overflow: hidden;
  border: 1px solid var(--line); border-radius: 14px; padding: 18px;
  background: rgba(243, 234, 217, 0.018);
  transition: transform 0.25s var(--ease), border-color 0.25s;
}
.platform-card:hover { transform: translateY(-3px); border-color: var(--line-strong); }
.platform-card.inactive { opacity: 0.35; }
.platform-card .accent-stripe { position: absolute; inset-block: 0; inset-inline-start: 0; width: 3px; }
.platform-head { display: flex; align-items: center; gap: 12px; margin-bottom: 15px; }
.platform-icon {
  width: 38px; height: 38px; border-radius: 11px;
  display: grid; place-items: center; font-weight: 700; font-size: 0.95rem;
  color: #fff; flex-shrink: 0; font-family: var(--mono);
}
.platform-name { flex: 1; font-size: 0.84rem; font-weight: 600; line-height: 1.3; color: var(--cream); min-width: 0; }
.platform-rev { font-family: var(--mono); font-size: 1.4rem; font-weight: 600; color: var(--gold); line-height: 1; margin-bottom: 5px; direction: ltr; font-variant-numeric: tabular-nums; }
.platform-pct-label { font-family: var(--mono); font-size: 0.66rem; color: var(--cream-faint); margin-bottom: 12px; direction: ltr; }
.platform-bar { height: 4px; background: rgba(243, 234, 217, 0.08); border-radius: 3px; overflow: hidden; }
.platform-bar-fill { height: 100%; border-radius: 3px; width: 0; transition: width 0.9s var(--ease); }

/* ─── COUNTRIES ─── */
.country-controls { display: flex; gap: 7px; flex-wrap: wrap; }
.country-btn {
  background: transparent; border: 1px solid var(--line); color: var(--cream-dim);
  padding: 6px 14px; border-radius: 100px; cursor: pointer;
  font-family: var(--mono); font-size: 0.62rem; letter-spacing: 0.12em; text-transform: uppercase;
  transition: all 0.2s;
}
html[lang="ku"] .country-btn { letter-spacing: 0; font-size: 0.74rem; }
.country-btn:hover { color: var(--cream); border-color: var(--line-strong); }
.country-btn.active { background: var(--gold); color: var(--ink-0); border-color: var(--gold); font-weight: 700; }
.country-list { display: flex; flex-direction: column; gap: 5px; }
.country-row {
  position: relative; overflow: hidden;
  display: grid; grid-template-columns: 34px 1fr auto; align-items: center; gap: 12px;
  padding: 10px 14px; border-radius: 10px; font-size: 0.88rem;
  transition: background 0.18s;
}
.country-row:hover { background: rgba(243, 234, 217, 0.03); }
.country-row .bar-bg {
  position: absolute; inset-block: 0; inset-inline-start: 0;
  background: linear-gradient(90deg, rgba(227, 180, 88, 0.16) 0%, rgba(227, 180, 88, 0.03) 100%);
  z-index: 0; pointer-events: none; border-radius: 10px; transition: width 0.7s var(--ease);
}

const MONTH_LABEL = { en: ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'],
                     ku: ['ڕێبەندان','ڕەشەمە','ئازار','نیسان','گوڵان','حوزەیران','تەممووز','گەلاوێژ','خەرمانان','ڕەزبەر','خەزەڵوەر','بەفرانبار'] };

let currentLang = localStorage.getItem('dp_shower_lang') || 'en';
let currentData = null;
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

function t(k) { const v = I18N[currentLang][k] !== undefined ? I18N[currentLang][k] : I18N.en[k]; return v !== undefined ? v : k; }
function money(n) { return '$' + (Number(n) || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
function initials(name) {
  const parts = String(name || '').trim().split(/\s+/).filter(Boolean);
  return ((parts[0] || '?')[0] + ((parts[1] || '')[0] || '')).toUpperCase();
}
function periodLabel(p, lang = currentLang) {
  if (!p) return '—';
  const [y, m] = p.split('-');
  return `${MONTH_LABEL[lang][parseInt(m) - 1]} ${y}`;
}

function applyLangToStatic() {
  document.documentElement.setAttribute('lang', currentLang);
  document.documentElement.setAttribute('dir', currentLang === 'ku' ? 'rtl' : 'ltr');
  document.querySelectorAll('[data-i18n]').forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === currentLang));
}

function parseRoute() {
  const parts = window.location.pathname.split('/').filter(Boolean);
  // /shower/:slug/:period?
  return { slug: parts[1], period: parts[2] || null };
}

/* gold-foil odometer for the hero figure */
function countUp(el, target) {
  if (reducedMotion || !target) { el.textContent = money(target); return; }
  const dur = 1350, start = performance.now();
  const tick = (now) => {
    const p = Math.min(1, (now - start) / dur);
    const eased = 1 - Math.pow(1 - p, 4);
    el.textContent = money(target * eased);
    if (p < 1) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

async function load() {
  const { slug, period } = parseRoute();
  try {
    const url = '/api/shower/public/' + slug + (period ? '/' + period : '');
    const res = await fetch(url);
    if (res.status === 404) {
      document.getElementById('mainContent').innerHTML =
        `<div class="empty"><div class="big">♫</div><h3>${t('notFound')}</h3><p>${t('noRoyaltyData')(slug)}</p></div>`;
      return;
    }
    if (!res.ok) throw new Error('Failed to load');
    currentData = await res.json();
    render();
  } catch (e) {
    document.getElementById('mainContent').innerHTML =
      `<div class="empty"><div class="big">⚠</div><h3>${t('couldNotLoad')}</h3><p>${e.message}</p></div>`;
  }
}

function render() {
  if (!currentData) return;
  const { artist, period, periods, byMonth = [], totalRevenue, totalQuantity, stores, countries, tracks, types } = currentData;

  document.title = `${artist.name} · Deng Parez`;
  document.getElementById('artistNameText').textContent = artist.name;
  document.getElementById('discMono').textContent = initials(artist.name);

  // Hero figure
  document.getElementById('heroAmountLabel').textContent =
    `${t('totalNetRevenue')} · ${period ? periodLabel(period) : t('allTime')}`;
  const amountRow = document.getElementById('heroAmountRow');
  amountRow.style.display = 'flex';
  countUp(document.getElementById('heroAmount'), totalRevenue || 0);

  // Period chips: "All time" + one per month
  const bar = document.getElementById('periodBar');
  const chips = document.getElementById('periodChips');
  chips.innerHTML = '';
  bar.style.display = (periods && periods.length) ? 'flex' : 'none';
  if (periods && periods.length) {
    const allChip = document.createElement('a');
    allChip.className = 'period-chip' + (!period ? ' active' : '');
    allChip.href = `/shower/${artist.slug}`;
    allChip.textContent = t('allTime');
    chips.appendChild(allChip);
    periods.forEach(p => {
      const chip = document.createElement('a');
      chip.className = 'period-chip' + (p === period ? ' active' : '');
      chip.href = `/shower/${artist.slug}/${p}`;
      chip.textContent = periodLabel(p);
      chips.appendChild(chip);
    });
  }

  // Download (styled .xlsx of the artist's full history)
  const dl = document.getElementById('downloadBtn');
  if (dl) {
    dl.href = `/api/shower/public/${artist.slug}/export`;
    dl.textContent = t('download');
  }

  if (!totalRevenue || totalRevenue <= 0) {
    document.getElementById('mainContent').innerHTML =
      `<div class="empty"><div class="big">📭</div><h3>${t('noData')}</h3></div>`;
    return;
  }

  const topTrack = tracks[0];
  const maxTypeRev = types.length ? types[0].rev : 0;

  const container = document.getElementById('mainContent');
  container.innerHTML = '';
  let order = 2; // reveal stagger continues after hero + period bar
  const section = (el) => { el.classList.add('reveal'); el.style.setProperty('--d', order++); container.appendChild(el); };

  // Credits line under the figure
  const cap = document.getElementById('heroCap');
  cap.innerHTML = '';
  const pill = (cls, emoji, bHtml, label) => {
    const p = document.createElement('span'); p.className = 'pill' + (cls ? ' ' + cls : '');
    const b = document.createElement('b'); b.textContent = bHtml;
    p.append(document.createTextNode(emoji + ' '), b, document.createTextNode(' ' + label));
    return p;
  };
  if (topTrack) cap.append(pill('star', '⭐', topTrack.name, t('topTrackLabel')));
  cap.append(pill('', '◍', (totalQuantity || 0).toLocaleString(), t('transactions')));
  cap.append(pill('', '✦', countries.filter(c => c.rev > 0).length, t('countriesReached')));
  cap.append(pill('', '♫', tracks.filter(x => x.rev > 0).length, t('tracksEarning')));
  cap.append(pill('', '▸', stores.filter(s => s.rev > 0).length, t('platforms')));

  // ── THE LEDGER (all-time view, >1 month) ──
  if (!period && byMonth && byMonth.length > 1) {
    const maxMonth = Math.max(...byMonth.map(m => m.total || 0), 0);
    const peakKey = byMonth.reduce((best, m) => (m.total > (best ? best.total : -1) ? m : best), null);
    const msCard = document.createElement('div'); msCard.className = 'card section';
    const body = byMonth.map(m => {
      const lbl = m.period ? periodLabel(m.period) : '—';
      const href = m.period ? `/shower/${artist.slug}/${m.period}` : '#';
      const w = maxMonth > 0 ? (m.total / maxMonth) * 100 : 0;
      const isPeak = peakKey && m.period === peakKey.period && byMonth.length > 2;
      return `<tr>
        <td class="ms-month"><a class="month-link" href="${href}">${lbl}</a>${isPeak ? `<span class="peak-tag">★ ${t('peak')}</span>` : ''}</td>
        <td class="ms-bar-cell"><div class="ms-bar"><i data-w="${w}"></i></div></td>
        <td class="ms-num">${money(m.total)}</td>
      </tr>`;
    }).join('');
    msCard.innerHTML = `
      <div class="card-head">
        <div>
          <div class="card-kicker">${t('ledgerKicker')}</div>
          <div class="card-title">${t('ledger')}</div>
          <div class="card-sub">${t('ledgerSub')}</div>
        </div>
        <span class="card-tag">${byMonth.length} ${t('month')}</span>
      </div>
      <div class="ms-wrap"><table class="ms-table">
        <thead><tr><th>${t('month')}</th><th>${t('share')}</th><th style="text-align:end;">${t('totalUsd')}</th></tr></thead>
        <tbody>${body}</tbody></table></div>`;
    section(msCard);
    requestAnimationFrame(() => setTimeout(() =>
      msCard.querySelectorAll('.ms-bar i').forEach(i => i.style.width = i.dataset.w + '%'), 140));
  }

  // ── GRID: platform share + transaction types ──
  const grid2 = document.createElement('div'); grid2.className = 'grid-2 section';

  const storeCard = document.createElement('div'); storeCard.className = 'card';
  storeCard.innerHTML = `
    <div class="card-head">
      <div>
        <div class="card-kicker">${t('shareKicker')}</div>
        <div class="card-title">${t('platformRevenueShare')}</div>
        <div class="card-sub">${t('distributionByStore')}</div>
      </div>
      <span class="card-tag">USD</span>
    </div>
    <div class="chart-wrap">
      <canvas id="storeChart"></canvas>
      <div class="chart-center"><span class="v">${money(totalRevenue)}</span><span class="l">${t('totalNetRevenue')}</span></div>
    </div>
    <div class="store-legend" id="storeLegend"></div>`;
  grid2.appendChild(storeCard);

  const txCard = document.createElement('div'); txCard.className = 'card';
  txCard.innerHTML = `
    <div class="card-head">
      <div>
        <div class="card-kicker">${t('shareKicker')}</div>
        <div class="card-title">${t('transactionTypes')}</div>
        <div class="card-sub">${t('txCategoryRevenue')}</div>
      </div>
      <span class="card-tag">${types.length} ${t('types')}</span>
    </div>
    <div class="tx-list" id="txList"></div>`;
  grid2.appendChild(txCard);
  section(grid2);

  // ── PLATFORMS ──
  const platSection = document.createElement('div'); platSection.className = 'section';
  platSection.innerHTML = `
    <div class="card">
      <div class="card-head">
        <div>
          <div class="card-kicker">${t('platformsKicker')}</div>
          <div class="card-title">${t('platformsTitle')}</div>
          <div class="card-sub">${t('platformsSub')}</div>
        </div>
        <span class="card-tag">${stores.length} ${t('stores')}</span>
      </div>
      <div class="platforms-grid" id="platformsGrid"></div>
    </div>`;
  section(platSection);

  // ── COUNTRIES ──
  if (countries.length > 0) {
    const cSection = document.createElement('div'); cSection.className = 'section';
    cSection.innerHTML = `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-kicker">${t('countriesKicker')}</div>
            <div class="card-title">${t('countries')}</div>
            <div class="card-sub">${t('revenueByTerritory')}</div>
          </div>
          <div class="country-controls">
            <button class="country-btn active" data-mode="top15">${t('top15')}</button>
            <button class="country-btn" data-mode="earning">${t('earning')}</button>
            <button class="country-btn" data-mode="all">${t('allCountries')} ${countries.length}</button>
          </div>
        </div>
        <div class="country-list" id="countryList"></div>
      </div>`;
    section(cSection);
  }

  // ── TRACKS ──
  if (tracks.length > 0) {
    const tSection = document.createElement('div'); tSection.className = 'section';
    tSection.innerHTML = `
      <div class="card">
        <div class="card-head">
          <div>
            <div class="card-kicker">${t('tracksKicker')}</div>
            <div class="card-title">${t('trackPerformance')}</div>
            <div class="card-sub">${t('revenuePerTrack')}</div>
          </div>
          <span class="card-tag">${tracks.length} ${t('tracksWord')}</span>
        </div>
        <table class="tracks-table">
          <thead><tr><th>${t('track')}</th><th class="right">${t('netRevenue')}</th></tr></thead>
          <tbody id="tracksBody"></tbody>
        </table>
      </div>`;
    section(tSection);
  }

  // Store doughnut
  const activeStores = stores.filter(s => s.rev > 0);
  if (activeStores.length) {
    new Chart(document.getElementById('storeChart').getContext('2d'), {
      type: 'doughnut',
      data: {
        labels: activeStores.map(s => s.name),
        datasets: [{
          data: activeStores.map(s => s.rev),
          backgroundColor: activeStores.map((s, i) => (PLATFORM_BRANDS[s.name] && PLATFORM_BRANDS[s.name].color) || STORE_COLORS[i % STORE_COLORS.length]),
          borderColor: '#0b0a07', borderWidth: 3, hoverOffset: 10
        }]
      },
      options: {
        responsive: true, maintainAspectRatio: false, cutout: '74%',
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#17150e', borderColor: 'rgba(227,180,88,0.35)', borderWidth: 1,
            titleColor: '#f3ead9', bodyColor: 'rgba(243,234,217,0.7)', padding: 12,
            titleFont: { family: 'Schibsted Grotesk' }, bodyFont: { family: 'Spline Sans Mono' },
            callbacks: {
              label: (ctx) => ` $${ctx.parsed.toFixed(2)} · ${((ctx.parsed / totalRevenue) * 100).toFixed(1)}%`
            }
          }
        }
      }
    });
  }

  // Store legend
  const legend = document.getElementById('storeLegend');
  stores.forEach((s, i) => {
    const row = document.createElement('div'); row.className = 'store-row';
    const color = (PLATFORM_BRANDS[s.name] && PLATFORM_BRANDS[s.name].color) || STORE_COLORS[i % STORE_COLORS.length];
    const pct = totalRevenue > 0 ? ((s.rev / totalRevenue) * 100).toFixed(1) : '0';
    const sw = document.createElement('span'); sw.className = 'swatch'; sw.style.background = color; sw.style.color = color;
    const nm = document.createElement('span'); nm.className = 'name'; nm.textContent = s.name;
    const vl = document.createElement('span'); vl.className = 'val'; vl.textContent = `${money(s.rev)} · ${pct}%`;
    row.append(sw, nm, vl);
    legend.appendChild(row);
  });

  // Transaction types
  const txList = document.getElementById('txList');
  types.forEach(tx => {
    const pct = maxTypeRev > 0 ? (tx.rev / maxTypeRev) * 100 : 0;
    const row = document.createElement('div'); row.className = 'tx-row';
    const bar = document.createElement('div'); bar.className = 'tx-bar';
    bar.style.clipPath = currentLang === 'ku'
      ? `inset(0 0 0 ${100 - pct}%)`
      : `inset(0 ${100 - pct}% 0 0)`;
    const name = document.createElement('div'); name.className = 'tx-name'; name.textContent = tx.name;
    const qty = document.createElement('div'); qty.className = 'tx-qty';
    const n = document.createElement('span'); n.className = 'n'; n.textContent = (tx.qty || 0).toLocaleString();
    qty.append(n, document.createTextNode(' ' + t('txShort')));
    const rev = document.createElement('div'); rev.className = 'tx-rev'; rev.textContent = money(tx.rev);
    row.append(bar, name, qty, rev);
    txList.appendChild(row);
  });

  // Platforms
  const pg = document.getElementById('platformsGrid');
  stores.forEach((s, i) => {
    const brand = PLATFORM_BRANDS[s.name] || { color: STORE_COLORS[i % STORE_COLORS.length], icon: '♪' };
    const pct = totalRevenue > 0 ? (s.rev / totalRevenue) * 100 : 0;
    const card = document.createElement('div');
    card.className = 'platform-card' + (s.rev === 0 ? ' inactive' : '');
    card.innerHTML = `
      <div class="accent-stripe" style="background:${brand.color}"></div>
      <div class="platform-head">
        <div class="platform-icon" style="background:${brand.color}">${brand.icon || '♪'}</div>
        <div class="platform-name"></div>
      </div>
      <div class="platform-rev">${money(s.rev)}</div>
      <div class="platform-pct-label">${pct.toFixed(1)}% ${currentLang === 'ku' ? 'لە گشتی' : 'of total'}</div>
      <div class="platform-bar"><div class="platform-bar-fill" style="background:linear-gradient(90deg,${brand.color}99 0%,${brand.color} 100%)"></div></div>`;
    card.querySelector('.platform-name').textContent = s.name;
    pg.appendChild(card);
    requestAnimationFrame(() => setTimeout(() => card.querySelector('.platform-bar-fill').style.width = pct + '%', 130));
  });

  // Countries + tracks
  if (countries.length > 0) renderCountries('top15');
  if (tracks.length > 0) renderTracks();
}

function renderCountries(mode) {
  if (!currentData) return;
  const { countries } = currentData;
  const sorted = [...countries].sort((a, b) => b.rev - a.rev);
  const maxRev = sorted[0] ? sorted[0].rev : 0;
  let list;
  if (mode === 'top15') list = sorted.slice(0, 15);
  else if (mode === 'earning') list = sorted.filter(c => c.rev > 0);
  else list = sorted;

  const cl = document.getElementById('countryList');
  cl.innerHTML = '';
  list.forEach((c, idx) => {
    const row = document.createElement('div');
    row.className = 'country-row' + (c.rev === 0 ? ' zero' : '');
    const pct = maxRev > 0 ? (c.rev / maxRev) * 100 : 0;
    row.innerHTML = `
      <div class="bar-bg" style="width:${pct}%"></div>
      <div class="rank">${String(idx + 1).padStart(2, '0')}</div>
      <div class="flag-label">
        <span class="flag">${COUNTRY_FLAGS[c.name] || '🌐'}</span>
        <span class="name"></span>
      </div>
      <span class="val">${c.rev > 0 ? money(c.rev) : '—'}</span>`;
    row.querySelector('.name').textContent = c.name;
    cl.appendChild(row);
  });

  document.querySelectorAll('.country-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
    b.onclick = () => renderCountries(b.dataset.mode);
  });
}

function renderTracks() {
  const { tracks, totalRevenue } = currentData;
  const maxRev = tracks[0] ? tracks[0].rev : 0;
  const body = document.getElementById('tracksBody');
  body.innerHTML = '';
  tracks.forEach((tk, idx) => {
    const pct = maxRev > 0 ? (tk.rev / maxRev) * 100 : 0;
    const pctTotal = totalRevenue > 0 ? ((tk.rev / totalRevenue) * 100).toFixed(1) : 0;
    const tr = document.createElement('tr'); tr.className = 'trow' + (idx === 0 ? ' first' : '');
    tr.innerHTML = `
      <td>
        <div class="track-cell">
          <div class="track-rank">${String(idx + 1).padStart(2, '0')}</div>
          <div class="track-body">
            <div class="track-title"></div>
            <div class="track-bar"><div class="track-bar-fill"></div></div>
          </div>
        </div>
      </td>
      <td class="rev-cell">
        <div class="track-rev">${money(tk.rev)}</div>
        <div class="track-pct">${t('pctOfTotal')(pctTotal)}</div>
      </td>`;
    tr.querySelector('.track-title').textContent = tk.name;
    body.appendChild(tr);
    requestAnimationFrame(() => setTimeout(() => tr.querySelector('.track-bar-fill').style.width = pct + '%', 130));
  });
}

document.querySelectorAll('.lang-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentLang = btn.dataset.lang;
    localStorage.setItem('dp_shower_lang', currentLang);
    applyLangToStatic();
    if (currentData) render();
    else load();
  });
});

applyLangToStatic();
load();
</script>
</body>
</html>
